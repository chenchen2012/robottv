<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Page not found on news.robot.tv. Return to the latest robotics coverage.">
  <meta name="robots" content="noindex,follow">
  <link rel="canonical" href="https://news.robot.tv/">
  <title>404 | robot.tv News</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#05070b; --panel:#0d131d; --panel2:#111a27; --text:#f3f6fb; --muted:#97a5bc; --line:#233048; --red:#ef2d52; --blue:#5e84ff; }
    * { box-sizing:border-box; }
    html, body { margin:0; min-height:100%; }
    body { font-family:'Space Grotesk',sans-serif; color:var(--text); background:var(--bg); }
    a { color:inherit; text-decoration:none; }
    .bg-grid { position:fixed; inset:0; z-index:0; background:linear-gradient(to right, rgba(255,255,255,.03) 1px, transparent 1px),linear-gradient(to bottom, rgba(255,255,255,.03) 1px, transparent 1px); background-size:28px 28px; mask-image:radial-gradient(circle at center, #000 30%, transparent 82%); }
    .bg-glow { position:fixed; width:520px; height:520px; filter:blur(80px); z-index:1; opacity:.23; pointer-events:none; }
    .red { background:var(--red); top:-170px; left:-120px; }
    .blue { background:var(--blue); right:-170px; top:20%; }
    .container { position:relative; z-index:2; width:min(980px,94vw); margin:0 auto; padding:1rem 0 2rem; }
    .panel { border:1px solid var(--line); border-radius:12px; background:linear-gradient(160deg,var(--panel),var(--panel2)); }
    .header { display:flex; align-items:center; justify-content:space-between; gap:1rem; border:1px solid var(--line); background:linear-gradient(135deg, rgba(10,15,24,.95), rgba(12,18,29,.95)); border-radius:10px; padding:.8rem 1rem; }
    .brand img { width:150px; display:block; }
    .nav { display:flex; gap:1rem; flex-wrap:wrap; color:var(--muted); font-weight:600; }
    .hero { margin-top:1rem; padding:1.35rem; text-align:center; }
    .kicker { margin:0; font-size:.75rem; letter-spacing:.12em; text-transform:uppercase; color:#acbcd7; font-weight:700; }
    h1 { margin:.5rem 0 0; font-family:'Orbitron',sans-serif; font-size:clamp(1.7rem,4.8vw,2.8rem); line-height:1.12; }
    .copy { margin:.9rem auto 0; color:var(--muted); line-height:1.7; max-width:640px; }
    .actions { margin-top:1rem; display:flex; justify-content:center; gap:.7rem; flex-wrap:wrap; }
    .btn { border-radius:8px; padding:.7rem 1rem; font-weight:700; border:0; display:inline-block; }
    .btn-primary { background:linear-gradient(110deg,var(--red),var(--blue)); }
    .btn-ghost { border:1px solid var(--line); background:rgba(17,26,39,.7); }
    @media (max-width:760px) { .header { flex-direction:column; align-items:flex-start; } }
  </style>
  <script src="scripts/ga-lazy.js?v=20260309-ga-v1"></script>
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow red" aria-hidden="true"></div>
  <div class="bg-glow blue" aria-hidden="true"></div>

  <div class="container">
    <header class="header">
      <a class="brand" href="https://robot.tv" aria-label="robot.tv home"><img src="https://robot.tv/images/robot_logo.png" alt="robot.tv"></a>
      <nav class="nav">
        <a href="https://robot.tv">Home</a>
        <a href="https://robot.tv/home.html">Robot Index</a>
        <a href="https://robot.tv/companies.html">Companies</a>
        <a href="https://robot.tv/live.html">Live Now</a>
        <a href="https://news.robot.tv">News</a>
      </nav>
    </header>

    <main class="panel hero">
      <p class="kicker">404</p>
      <h1>This link is out of date</h1>
      <p class="copy">The page you requested no longer exists. We have upgraded robot.tv News routing and content structure.</p>
      <div class="actions">
        <a class="btn btn-primary" href="https://news.robot.tv/">Open Latest News</a>
        <a class="btn btn-ghost" href="https://robot.tv/home.html">Open Robot Index</a>
      </div>
    </main>
  </div>
</body>
</html>
