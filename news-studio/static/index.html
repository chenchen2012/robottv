<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="robot.tv News: video-first robotics intelligence covering humanoids, quadrupeds, and startup execution.">
  <title>robot.tv News</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#05070b; --panel:#0d131d; --panel2:#111a27; --text:#f3f6fb; --muted:#97a5bc; --line:#233048; --red:#ef2d52; --blue:#5e84ff; }
    * { box-sizing: border-box; } html,body { margin:0; padding:0; min-height:100%; }
    body { font-family:'Space Grotesk',sans-serif; color:var(--text); background:var(--bg); overflow-x:hidden; }
    a { color:inherit; text-decoration:none; }
    .bg-grid { position:fixed; inset:0; z-index:0; background:linear-gradient(to right, rgba(255,255,255,.03) 1px, transparent 1px),linear-gradient(to bottom, rgba(255,255,255,.03) 1px, transparent 1px); background-size:28px 28px; mask-image:radial-gradient(circle at center, #000 30%, transparent 82%); }
    .bg-glow { position:fixed; width:520px; height:520px; filter:blur(80px); z-index:1; opacity:.23; pointer-events:none; }
    .red { background:var(--red); top:-170px; left:-120px; } .blue { background:var(--blue); right:-170px; top:20%; }
    .container { position:relative; z-index:2; width:min(1180px,94vw); margin:0 auto; padding:1rem 0 2rem; }
    .panel { border:1px solid var(--line); border-radius:12px; background:linear-gradient(160deg,var(--panel),var(--panel2)); }
    .header { display:flex; align-items:center; justify-content:space-between; gap:1rem; border:1px solid var(--line); background:linear-gradient(135deg, rgba(10,15,24,.95), rgba(12,18,29,.95)); border-radius:10px; padding:.8rem 1rem; }
    .brand img { width:150px; display:block; }
    .nav { display:flex; gap:1rem; flex-wrap:wrap; color:var(--muted); font-weight:600; }
    .cta { border:1px solid #46597a; border-radius:999px; padding:.45rem .9rem; font-weight:700; font-size:.88rem; }
    .hero { margin-top:1rem; padding:1.35rem; }
    .kicker { margin:0; font-size:.75rem; letter-spacing:.12em; text-transform:uppercase; color:#acbcd7; font-weight:700; }
    h1,h2 { margin:0; font-family:'Orbitron',sans-serif; line-height:1.1; }
    .hero h1 { margin-top:.4rem; font-size:clamp(1.9rem,5vw,3.2rem); }
    .copy { margin-top:.85rem; color:var(--muted); line-height:1.7; max-width:780px; }
    .actions { margin-top:1rem; display:flex; gap:.7rem; flex-wrap:wrap; }
    .btn { border-radius:8px; padding:.7rem 1rem; font-weight:700; border:0; display:inline-block; }
    .btn-primary { background:linear-gradient(110deg,var(--red),var(--blue)); }
    .btn-ghost { border:1px solid var(--line); background:rgba(17,26,39,.7); }
    .section { margin-top:1.2rem; }
    .section-head { display:flex; justify-content:space-between; align-items:center; gap:.7rem; border-bottom:1px solid var(--line); padding-bottom:.5rem; margin-bottom:.8rem; }
    .section-head h2 { font-size:1.04rem; letter-spacing:.04em; }
    .grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:.85rem; }
    .card { border:1px solid var(--line); border-radius:10px; background:linear-gradient(160deg,#101926,#0b131f); overflow:hidden; }
    .card.featured { grid-column:span 2; border-color:#3d5378; box-shadow:0 0 0 1px rgba(94,132,255,.18) inset; }
    .thumb { width:100%; aspect-ratio:16/9; object-fit:cover; display:block; border-bottom:1px solid #24344f; }
    .thumb-shell { position:relative; display:block; }
    .thumb-preview { position:absolute; inset:0; opacity:0; transition:opacity .15s ease; border-bottom:1px solid #24344f; overflow:hidden; pointer-events:none; background:#000; }
    .thumb-preview iframe { width:100%; height:100%; border:0; display:block; }
    .card.previewing .thumb-preview { opacity:1; }
    .content { padding:.85rem; }
    .meta { margin:0; color:#9fb2d4; font-size:.8rem; letter-spacing:.05em; text-transform:uppercase; }
    .card h3 { margin:.45rem 0 0; line-height:1.3; font-size:1.04rem; }
    .card p { margin:.55rem 0 0; color:var(--muted); line-height:1.55; }
    .row { margin-top:.7rem; display:flex; gap:.6rem; flex-wrap:wrap; }
    .empty { margin-top:1rem; padding:1rem; color:var(--muted); }

    .article { margin-top:1rem; display:grid; grid-template-columns:2fr 1fr; gap:.9rem; }
    .article-main,.article-side { padding:1rem; }
    .article h1 { font-size:clamp(1.7rem,4.5vw,2.7rem); }
    .video-wrap { margin-top:.75rem; border:1px solid #24344f; border-radius:10px; overflow:hidden; background:#000; }
    .video-wrap iframe { width:100%; aspect-ratio:16/9; border:0; display:block; }
    .article-body p { color:#c6d2e8; line-height:1.75; margin:.9rem 0 0; }
    .tag-list { margin:.6rem 0 0; padding:0; list-style:none; display:flex; flex-wrap:wrap; gap:.45rem; }
    .tag-list li { border:1px solid #2a3f5d; border-radius:999px; padding:.22rem .55rem; color:#c6d2e8; font-size:.8rem; }

    .footer { margin-top:1.2rem; padding:1rem; display:flex; justify-content:space-between; gap:.8rem; flex-wrap:wrap; color:#a7b7d1; font-size:.9rem; }
    .footer-links { display:flex; gap:.9rem; flex-wrap:wrap; }

    @media (max-width:980px){ .grid{grid-template-columns:1fr 1fr;} .card.featured{grid-column:span 2;} .article{grid-template-columns:1fr;} }
    @media (max-width:760px){ .header{flex-direction:column; align-items:flex-start;} .grid{grid-template-columns:1fr;} .card.featured{grid-column:auto;} }
  </style>
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow red" aria-hidden="true"></div>
  <div class="bg-glow blue" aria-hidden="true"></div>

  <div class="container">
    <header class="header">
      <a class="brand" href="https://robot.tv" aria-label="robot.tv home"><img src="https://robot.tv/images/robot_logo.png" alt="robot.tv"></a>
      <nav class="nav">
        <a href="https://robot.tv">Home</a>
        <a href="https://robot.tv/home.html">Robot Index</a>
        <a href="https://robot.tv/live.html">Live Now</a>
      </nav>
      <a class="cta" href="mailto:chenchen2012&#64;hotmail&#46;com">Submit Video</a>
    </header>

    <main id="app"></main>
    <footer class="panel footer">
      <div>robot.tv News | Real-time robotics briefings</div>
      <div class="footer-links">
        <a href="https://robot.tv">robot.tv</a>
        <a href="https://robot.tv/home.html">Robot Index</a>
        <a href="https://robot.tv/about.html">About</a>
      </div>
    </footer>
  </div>

  <script>
    const projectId = "lumv116w";
    const dataset = "production";
    const app = document.getElementById("app");
    const path = window.location.pathname.replace(/\/$/, "") || "/";

    const esc = (s) => String(s || "").replace(/[&<>"]/g, (ch) => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[ch]));
    const videoId = (u) => (String(u || "").match(/[?&]v=([^&]+)/) || String(u || "").match(/youtu\.be\/([^?&]+)/) || [])[1] || "";
    const thumb = (u) => { const id = videoId(u); return id ? `https://img.youtube.com/vi/${id}/hqdefault.jpg` : "https://robot.tv/images/robot_logo.png"; };
    const formatDate = (iso) => new Date(iso).toLocaleDateString("en-US", {year:"numeric", month:"short", day:"numeric"});
    const sanityQuery = (q) => `https://${projectId}.api.sanity.io/v2023-10-01/data/query/${dataset}?query=${encodeURIComponent(q)}`;
    const sanityParam = (value) => encodeURIComponent(JSON.stringify(value));
    const normalizeTitle = (s) => String(s || "")
      .toLowerCase()
      .replace(/['’]/g, "")
      .replace(/[^a-z0-9\s]/g, " ")
      .replace(/\s+/g, " ")
      .trim();
    const dedupePosts = (posts) => {
      const seen = new Set();
      return posts.filter((p) => {
        const key = normalizeTitle(p.title).split(" ").filter((w) => !["the","a","an","and","for","to","of","in","on","with","after","than"].includes(w)).slice(0, 8).join(" ");
        if (!key || seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    };

    const blockToText = (block) => (block.children || []).map((c) => c.text || "").join("").trim();

    const renderList = (posts) => {
      app.innerHTML = `
        <section class="panel hero">
          <p class="kicker">ROBOTICS NEWSROOM</p>
          <h1>Breaking Robotics, Everywhere</h1>
        <p class="copy">From humanoid deployment signals to startup execution velocity, robot.tv News tracks what matters with video-first reporting.</p>
        <div class="actions">
            <a class="btn btn-ghost" href="https://robot.tv">Back to robot.tv</a>
        </div>
      </section>
      <section class="section">
        <div class="section-head">
          <h2>Latest News</h2>
        </div>
          <div id="grid" class="grid"></div>
        <div id="empty" class="panel empty" hidden>No published posts yet. Check back soon for updates.</div>
        </section>
      `;

      const grid = document.getElementById("grid");
      const empty = document.getElementById("empty");
      if (!posts.length) { empty.hidden = false; return; }
      const uniquePosts = dedupePosts(posts);
      if (!uniquePosts.length) { empty.hidden = false; return; }
      grid.innerHTML = uniquePosts.map((p, i) => `
        <article class="card ${i === 0 ? "featured" : ""}" data-video="${esc(p.youtubeUrl || "")}">
          <span class="thumb-shell">
            <img class="thumb" src="${esc(thumb(p.youtubeUrl))}" alt="${esc(p.title)} thumbnail" loading="lazy">
            <span class="thumb-preview" aria-hidden="true"></span>
          </span>
          <div class="content">
            <p class="meta">${esc(formatDate(p.publishedAt))} | ${esc(p.author || "robot.tv")}</p>
            <h3><a href="/post/${esc(p.slug)}">${esc(p.title)}</a></h3>
            <p>${esc(p.excerpt || "Latest robotics intelligence from robot.tv.")}</p>
            <div class="row">
              <a class="btn btn-primary" href="/post/${esc(p.slug)}">Open Briefing</a>
            </div>
          </div>
        </article>
      `).join("");

      const canHoverPreview = window.matchMedia("(hover: hover) and (pointer: fine)").matches;
      if (!canHoverPreview) return;

      const toEmbed = (u) => {
        const id = videoId(u);
        return id ? `https://www.youtube.com/embed/${id}?autoplay=1&mute=1&playsinline=1&rel=0&modestbranding=1` : "";
      };

      const startPreview = (card) => {
        const slot = card.querySelector(".thumb-preview");
        const embed = toEmbed(card.dataset.video);
        if (!slot || !embed || slot.dataset.active === "1") return;
        slot.innerHTML = `<iframe src="${esc(embed)}" title="Article preview" loading="lazy" allow="autoplay; encrypted-media; picture-in-picture" referrerpolicy="strict-origin-when-cross-origin"></iframe>`;
        slot.dataset.active = "1";
        card.classList.add("previewing");
      };

      const stopPreview = (card) => {
        const slot = card.querySelector(".thumb-preview");
        if (!slot) return;
        slot.innerHTML = "";
        slot.dataset.active = "0";
        card.classList.remove("previewing");
      };

      grid.querySelectorAll(".card").forEach((card) => {
        card.addEventListener("mouseenter", () => startPreview(card));
        card.addEventListener("mouseleave", () => stopPreview(card));
        card.addEventListener("blur", () => stopPreview(card));
      });
    };

    const renderArticle = (post) => {
      if (!post) {
        app.innerHTML = `
          <section class="panel hero">
            <p class="kicker">NOT FOUND</p>
            <h1>Article Not Found</h1>
            <p class="copy">This article may have been removed or its slug changed.</p>
            <div class="actions"><a class="btn btn-primary" href="/">Back to News</a></div>
          </section>
        `;
        return;
      }

      const tags = Array.isArray(post.categories) ? post.categories : [];
      const paragraphs = (post.body || []).filter((b) => b._type === "block").map(blockToText).filter(Boolean);
      const ytId = videoId(post.youtubeUrl);
      const embed = ytId ? `https://www.youtube.com/embed/${ytId}?autoplay=1&mute=1&rel=0&modestbranding=1&playsinline=1` : "";
      document.title = `${post.title} | robot.tv News`;

      app.innerHTML = `
        <section class="section-head" style="margin-top:1rem;">
          <h2><a href="/">Newsroom</a></h2>
        </section>

        <section class="article">
          <article class="panel article-main">
            <p class="kicker">ARTICLE</p>
            <h1>${esc(post.title)}</h1>
            <p class="meta" style="margin-top:.55rem;">${esc(formatDate(post.publishedAt))} | ${esc(post.author || "robot.tv")}</p>
            <p class="copy" style="max-width:none;">${esc(post.excerpt || "")}</p>
            ${embed ? `<div class="video-wrap"><iframe src="${esc(embed)}" title="${esc(post.title)} video" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe></div>` : ""}
            <div class="article-body">
              ${paragraphs.length ? paragraphs.map((p) => `<p>${esc(p)}</p>`).join("") : '<p>Content will be added soon.</p>'}
            </div>
            <div class="actions">
              <a class="btn btn-primary" href="/">Back to News</a>
            </div>
          </article>
          <aside class="panel article-side">
            <h2 style="font-size:1.1rem;">Article Snapshot</h2>
            <p class="copy" style="margin-top:.55rem;">This article is part of robot.tv's video-first robotics coverage.</p>
            <ul class="tag-list">${tags.length ? tags.map((t) => `<li>${esc(t)}</li>`).join("") : "<li>General</li>"}</ul>
          </aside>
        </section>
      `;
    };

    if (path.startsWith("/post/")) {
      const slug = path.replace("/post/", "").trim();
      const query = `*[_type=="post" && slug.current==$slug][0]{title,excerpt,publishedAt,youtubeUrl,body,"author":author->name,"categories":categories[]->title}`;
      fetch(sanityQuery(query) + `&$slug=${sanityParam(slug)}`)
        .then((r) => r.json())
        .then((d) => renderArticle(d.result || null))
        .catch(() => renderArticle(null));
    } else {
      const query = `*[_type=="post"] | order(publishedAt desc)[0...12]{title,excerpt,publishedAt,youtubeUrl,"slug":slug.current,"author":author->name}`;
      fetch(sanityQuery(query))
        .then((r) => r.json())
        .then((d) => renderList(Array.isArray(d.result) ? d.result : []))
        .catch(() => renderList([]));
    }
  </script>
</body>
</html>
