<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>
    :root { --bg:#05070b; --panel:#0d131d; --panel2:#111a27; --text:#f3f6fb; --muted:#97a5bc; --line:#233048; --red:#ef2d52; --blue:#5e84ff; }
    * { box-sizing: border-box; } html,body { margin:0; padding:0; min-height:100%; }
    body { font-family:'Space Grotesk',sans-serif; color:var(--text); background:var(--bg); overflow-x:hidden; }
    a { color:inherit; text-decoration:none; }
    .bg-grid { position:fixed; inset:0; z-index:0; background:linear-gradient(to right, rgba(255,255,255,.03) 1px, transparent 1px),linear-gradient(to bottom, rgba(255,255,255,.03) 1px, transparent 1px); background-size:28px 28px; mask-image:radial-gradient(circle at center, #000 30%, transparent 82%); }
    .bg-glow { position:fixed; width:520px; height:520px; filter:blur(80px); z-index:1; opacity:.23; pointer-events:none; }
    .red { background:var(--red); top:-170px; left:-120px; } .blue { background:var(--blue); right:-170px; top:20%; }
    .container { position:relative; z-index:2; width:min(1180px,94vw); margin:0 auto; padding:1rem 0 2rem; }
    .panel { border:1px solid var(--line); border-radius:12px; background:linear-gradient(160deg,var(--panel),var(--panel2)); }
    .header { display:flex; align-items:center; justify-content:space-between; gap:1rem; border:1px solid var(--line); background:linear-gradient(135deg, rgba(10,15,24,.95), rgba(12,18,29,.95)); border-radius:10px; padding:.8rem 1rem; }
    .brand img { width:150px; display:block; }
    .nav { display:flex; gap:1rem; flex-wrap:wrap; color:var(--muted); font-weight:600; }
    .nav a { transition:color .2s ease, background .2s ease, box-shadow .2s ease, transform .2s ease; }
    .nav a:hover { color:#d3deef; }
    .nav a.is-active { border:1px solid #5c80bb; border-radius:999px; padding:.22rem .62rem; color:#f4f8ff; background:linear-gradient(120deg, rgba(94,132,255,.32), rgba(94,132,255,.16)); box-shadow:0 0 0 1px rgba(94,132,255,.28) inset, 0 4px 14px rgba(28,52,96,.34); transform:translateY(-1px); }
    .cta { border:1px solid #46597a; border-radius:999px; padding:.45rem .9rem; font-weight:700; font-size:.88rem; }
    .hero { margin-top:1rem; padding:1.35rem; }
    .kicker { margin:0; font-size:.75rem; letter-spacing:.12em; text-transform:uppercase; color:#acbcd7; font-weight:700; }
    h1,h2 { margin:0; font-family:'Orbitron',sans-serif; line-height:1.1; }
    .hero h1 { margin-top:.4rem; font-size:clamp(1.9rem,5vw,3.2rem); }
    .copy { margin-top:.85rem; color:var(--muted); line-height:1.7; max-width:780px; }
    .actions { margin-top:1rem; display:flex; gap:.7rem; flex-wrap:wrap; }
    .btn { border-radius:8px; padding:.7rem 1rem; font-weight:700; border:0; display:inline-block; }
    .btn-primary { background:linear-gradient(110deg,var(--red),var(--blue)); }
    .btn-ghost { border:1px solid var(--line); background:rgba(17,26,39,.7); }
    .section { margin-top:1.2rem; }
    .section-head { display:flex; justify-content:space-between; align-items:center; gap:.7rem; border-bottom:1px solid var(--line); padding-bottom:.5rem; margin-bottom:.8rem; }
    .section-head h2 { font-size:1.04rem; letter-spacing:.04em; }
    .grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:.85rem; }
    .card { border:1px solid var(--line); border-radius:10px; background:linear-gradient(160deg,#101926,#0b131f); overflow:hidden; }
    .card.featured { grid-column:span 2; border-color:#3d5378; box-shadow:0 0 0 1px rgba(94,132,255,.18) inset; }
    .thumb { width:100%; aspect-ratio:16/9; object-fit:cover; display:block; border-bottom:1px solid #24344f; }
    .thumb-shell { position:relative; display:block; }
    .thumb-preview { position:absolute; inset:0; opacity:0; transition:opacity .15s ease; border-bottom:1px solid #24344f; overflow:hidden; pointer-events:none; background:#000; }
    .thumb-preview iframe { width:100%; height:100%; border:0; display:block; }
    .card.previewing .thumb-preview { opacity:1; }
    .content { padding:.85rem; }
    .meta { margin:0; color:#9fb2d4; font-size:.8rem; letter-spacing:.05em; text-transform:uppercase; }
    .card h3 { margin:.45rem 0 0; line-height:1.3; font-size:1.04rem; }
    .card p { margin:.55rem 0 0; color:var(--muted); line-height:1.55; }
    .row { margin-top:.7rem; display:flex; gap:.6rem; flex-wrap:wrap; }
    .empty { margin-top:1rem; padding:1rem; color:var(--muted); }

    .article { margin-top:1rem; display:grid; grid-template-columns:1fr; gap:.9rem; min-width:0; }
    .article-main,.article-side { padding:1rem; min-width:0; }
    .article h1 {
      font-family:'Space Grotesk',sans-serif;
      font-size:clamp(1.2rem,2.7vw,1.95rem);
      font-weight:700;
      line-height:1.2;
      letter-spacing:.01em;
      white-space:normal;
      max-width:100%;
      overflow:hidden;
      overflow-wrap:anywhere;
      word-break:break-word;
    }
    .video-wrap {
      margin:.8rem auto 0;
      width:100%;
      max-width:780px;
      border:1px solid #24344f;
      border-radius:10px;
      overflow:hidden;
      background:#000;
      box-shadow:0 10px 28px rgba(0, 0, 0, 0.28);
    }
    .video-wrap iframe { width:100%; aspect-ratio:16/9; border:0; display:block; }
    .video-poster-btn {
      border:0;
      margin:0;
      padding:0;
      width:100%;
      aspect-ratio:16/9;
      display:grid;
      place-items:center;
      gap:.55rem;
      cursor:pointer;
      background:
        radial-gradient(120% 120% at 16% 10%, rgba(94,132,255,.28), transparent 55%),
        radial-gradient(120% 120% at 82% 86%, rgba(239,45,82,.2), transparent 58%),
        linear-gradient(160deg, #0a111c, #050a12);
    }
    .video-play-badge {
      border:1px solid #5d79ad;
      border-radius:999px;
      background:rgba(8,14,24,0.86);
      color:#e7efff;
      font-weight:700;
      font-size:.88rem;
      padding:.48rem .84rem;
      letter-spacing:.03em;
      box-shadow:0 8px 24px rgba(2,6,12,0.45);
    }
    .video-poster-label {
      color:#c3d4f1;
      font-size:.9rem;
      letter-spacing:.03em;
    }
    .video-hint {
      margin:.5rem 0 0;
      color:#9fb2d4;
      font-size:.82rem;
    }
    .article-body p { color:#c6d2e8; line-height:1.75; margin:.9rem 0 0; }
    .tag-list { margin:.6rem 0 0; padding:0; list-style:none; display:flex; flex-wrap:wrap; gap:.45rem; }
    .tag-list li { border:1px solid #2a3f5d; border-radius:999px; padding:.22rem .55rem; color:#c6d2e8; font-size:.8rem; }

    .footer { margin-top:1.2rem; padding:1rem; display:flex; justify-content:space-between; gap:.8rem; flex-wrap:wrap; color:#a7b7d1; font-size:.9rem; }
    .footer-links { display:flex; gap:.9rem; flex-wrap:wrap; }
    .newsletter { margin-top:1.1rem; padding:1rem; }
    .newsletter h2 { font-size:1.15rem; margin:0.45rem 0 0; }
    .newsletter-form { margin-top:.75rem; display:flex; gap:.55rem; flex-wrap:wrap; }
    .newsletter-form input[type="email"] { flex:1 1 240px; border:1px solid #2f4465; border-radius:9px; background:#0b1421; color:#e9f1ff; font:inherit; padding:.58rem .62rem; }
    .newsletter-note { margin-top:.45rem; color:#9cb0d2; font-size:.82rem; }
    .pagination { margin-top:.85rem; display:flex; justify-content:center; gap:.5rem; flex-wrap:wrap; }
    .pagination .btn[aria-disabled="true"] { opacity:.45; pointer-events:none; }
    .pagination-status { color:#9cb0d2; font-size:.88rem; align-self:center; }

    @media (max-width:980px){ .grid{grid-template-columns:1fr 1fr;} .card.featured{grid-column:span 2;} .article{grid-template-columns:1fr;} }
    @media (max-width:760px){ .header{flex-direction:column; align-items:flex-start;} .grid{grid-template-columns:1fr;} .card.featured{grid-column:auto;} }
  </style>
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow red" aria-hidden="true"></div>
  <div class="bg-glow blue" aria-hidden="true"></div>

  <div class="container">
    <header class="header">
      <a class="brand" href="https://robot.tv" aria-label="robot.tv home"><img src="https://robot.tv/images/robot_logo.png" alt="robot.tv"></a>
      <nav class="nav">
        <a href="https://robot.tv">Home</a>
        <a href="https://robot.tv/home.html">Robot Index</a>
        <a href="https://robot.tv/companies.html">Companies</a>
        <a href="https://robot.tv/live.html">Live Now</a>
        <a href="/">News</a>
        <a href="https://robot.tv/partner.html">Partner</a>
        <a href="https://robot.tv/about.html">About</a>
      </nav>
      <a class="cta" href="https://robot.tv/get-featured">Get Featured</a>
    </header>

    <main id="app"></main>
    <footer class="panel footer">
      <div>robot.tv News | Real-time robotics briefings</div>
      <div class="footer-links">
        <a href="https://robot.tv">robot.tv</a>
        <a href="https://robot.tv/home.html">Robot Index</a>
        <a href="https://robot.tv/companies.html">Companies</a>
        <a href="https://robot.tv/live.html">Live</a>
        <a href="https://robot.tv/partner.html">Partner</a>
        <a href="https://robot.tv/about.html">About</a>
      </div>
    </footer>
  </div>

  <script>
    (() => {
      const nav = document.querySelector('.nav');
      if (!nav) return;
      const path = (window.location.pathname || '/').replace(/\/+$/, '') || '/';
      const onNews = path === '/' || path.startsWith('/post/');
      nav.querySelectorAll('a').forEach((a) => {
        const href = a.getAttribute('href') || '';
        if ((onNews && href === '/') || (!onNews && href !== '/')) a.classList.add('is-active');
      });
    })();

    const projectId = "lumv116w";
    const dataset = "production";
    const PAGE_SIZE = 12;
    const FETCH_DEPTH = 60;
    const CACHE_KEY = "robot_tv_news_cache_v1";
    const app = document.getElementById("app");
    const path = window.location.pathname.replace(/\/$/, "") || "/";
    const params = new URLSearchParams(window.location.search || "");
    const requestedPage = Math.max(1, parseInt(params.get("page") || "1", 10) || 1);
    const canonical = document.getElementById("canonical-link");
    if (canonical) {
      const search = path === "/" && requestedPage > 1 ? `?page=${requestedPage}` : "";
      canonical.setAttribute("href", `https://news.robot.tv${path === "/" ? "/" : path}${search}`);
    }
    const setRobots = (content) => {
      let tag = document.querySelector('meta[name="robots"]');
      if (!tag) {
        tag = document.createElement("meta");
        tag.setAttribute("name", "robots");
        document.head.appendChild(tag);
      }
      tag.setAttribute("content", content);
    };
    setRobots("index,follow");

    const esc = (s) => String(s || "").replace(/[&<>"]/g, (ch) => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[ch]));
    const videoId = (u) => (String(u || "").match(/[?&]v=([^&]+)/) || String(u || "").match(/youtu\.be\/([^?&]+)/) || [])[1] || "";
    const thumb = (u, quality = "hq") => {
      const id = videoId(u);
      if (!id) return "https://robot.tv/images/robot_logo.png";
      return `https://img.youtube.com/vi/${id}/hqdefault.jpg`;
    };
    const formatDate = (iso) => new Date(iso).toLocaleDateString("en-US", {year:"numeric", month:"short", day:"numeric"});
    const sanityUrls = (q) => {
      const enc = encodeURIComponent(q);
      return [
        `https://${projectId}.apicdn.sanity.io/v2023-10-01/data/query/${dataset}?query=${enc}`,
        `https://${projectId}.api.sanity.io/v2023-10-01/data/query/${dataset}?query=${enc}`
      ];
    };
    const fetchJsonWithFallback = async (urls) => {
      let lastErr = null;
      for (const u of urls) {
        try {
          const r = await fetch(u, { cache: "no-store" });
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          return await r.json();
        } catch (e) {
          lastErr = e;
        }
      }
      throw lastErr || new Error("Feed fetch failed");
    };
    const sanityParam = (value) => encodeURIComponent(JSON.stringify(value));
    const normalizeTitle = (s) => String(s || "")
      .toLowerCase()
      .replace(/['’]/g, "")
      .replace(/[^a-z0-9\s]/g, " ")
      .replace(/\s+/g, " ")
      .trim();
    const dedupePosts = (posts) => {
      const seen = new Set();
      return posts.filter((p) => {
        const key = normalizeTitle(p.title).split(" ").filter((w) => !["the","a","an","and","for","to","of","in","on","with","after","than"].includes(w)).slice(0, 8).join(" ");
        if (!key || seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    };

    const blockToText = (block) => (block.children || []).map((c) => c.text || "").join("").trim();
    const shouldRenderParagraph = (text) => {
      const t = String(text || "").trim();
      if (!t) return false;
      if (/^status:/i.test(t)) return false;
      if (/^original coverage link:/i.test(t)) return false;
      if (/news\.google\.com\/rss\/articles/i.test(t)) return false;
      return true;
    };
    const toPlain = (s) => String(s || "").replace(/\s+/g, " ").trim();

    const setArticleJsonLd = (post) => {
      if (!post) return;
      const canonicalUrl = `https://news.robot.tv/post/${post.slug || ""}`;
      const json = {
        "@context": "https://schema.org",
        "@type": "NewsArticle",
        "headline": toPlain(post.title || ""),
        "description": toPlain(post.excerpt || ""),
        "datePublished": post.publishedAt || new Date().toISOString(),
        "dateModified": post.publishedAt || new Date().toISOString(),
        "mainEntityOfPage": canonicalUrl,
        "url": canonicalUrl,
        "publisher": {
          "@type": "Organization",
          "name": "robot.tv",
          "logo": {
            "@type": "ImageObject",
            "url": "https://robot.tv/images/robot_logo.png"
          }
        },
        "author": {
          "@type": "Person",
          "name": toPlain(post.author || "robot.tv")
        },
        "image": [thumb(post.youtubeUrl)]
      };

      const existing = document.getElementById("article-jsonld");
      if (existing) existing.remove();
      const script = document.createElement("script");
      script.id = "article-jsonld";
      script.type = "application/ld+json";
      script.textContent = JSON.stringify(json);
      document.head.appendChild(script);
    };

    const getCachedPosts = () => {
      try {
        const raw = localStorage.getItem(CACHE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        if (!parsed || !Array.isArray(parsed.posts)) return [];
        return parsed.posts;
      } catch (_) {
        return [];
      }
    };

    const cachePosts = (posts) => {
      try {
        if (!Array.isArray(posts) || !posts.length) return;
        localStorage.setItem(CACHE_KEY, JSON.stringify({
          savedAt: new Date().toISOString(),
          posts
        }));
      } catch (_) {}
    };

    const renderList = (posts, options = {}) => {
      const { warning = "", emptyMessage = "No published posts yet. Check back soon for updates." } = options;
      document.title = "Robot News & Robotics News | robot.tv";
      setRobots("index,follow");
      app.innerHTML = `
        <section class="panel hero">
          <p class="kicker">ROBOTICS NEWSROOM</p>
          <h1>Robot News and Robotics News, Daily</h1>
        <p class="copy">From humanoid robot news to AI robotics news and startup execution velocity, robot.tv News tracks the biggest robot news stories with video-first reporting.</p>
        <div class="actions">
            <a class="btn btn-ghost" href="https://robot.tv">Back to robot.tv</a>
        </div>
      </section>
      <section class="section">
        <div class="section-head">
	          <h2>Latest Robot News</h2>
        </div>
        ${warning ? `<div class="panel empty" style="margin-bottom:.7rem;">${esc(warning)}</div>` : ""}
          <div id="grid" class="grid"></div>
        <div id="empty" class="panel empty" hidden>${esc(emptyMessage)}</div>
      </section>
      <section class="panel newsletter">
        <p class="kicker">NEWSLETTER</p>
        <h2>Get The Weekly Robot Brief</h2>
	        <p class="copy">One concise email with the biggest robot news and robotics market signals from robot.tv News.</p>
        <form class="newsletter-form" method="POST" action="https://formsubmit.co/chenchen2012@hotmail.com">
          <input type="hidden" name="_next" value="https://robot.tv/contact-success/">
          <input type="hidden" name="_subject" value="robot.tv newsletter signup from news">
          <input type="hidden" name="_captcha" value="false">
          <input type="text" name="_honey" style="position:absolute;left:-5000px;" tabindex="-1" autocomplete="off">
          <input type="hidden" name="topic" value="newsletter-signup">
          <input type="hidden" name="source" value="news-robot-tv">
          <input type="email" name="email" placeholder="you@company.com" required>
          <button class="btn btn-primary" type="submit">Subscribe</button>
        </form>
        <p class="newsletter-note">No spam. Unsubscribe any time.</p>
      </section>
      `;

      const grid = document.getElementById("grid");
      const empty = document.getElementById("empty");
      if (!posts.length) { empty.hidden = false; return; }
      const uniquePosts = dedupePosts(posts);
      if (!uniquePosts.length) { empty.hidden = false; return; }
      const totalPages = Math.max(1, Math.ceil(uniquePosts.length / PAGE_SIZE));
      const page = Math.min(requestedPage, totalPages);
      const from = (page - 1) * PAGE_SIZE;
      const pagePosts = uniquePosts.slice(from, from + PAGE_SIZE);
      if (!pagePosts.length) { empty.hidden = false; return; }
      grid.innerHTML = pagePosts.map((p, i) => `
        <article class="card ${i === 0 ? "featured" : ""}" data-video="${esc(p.youtubeUrl || "")}">
          <span class="thumb-shell">
            <img class="thumb" src="${esc(thumb(p.youtubeUrl, "hq"))}" alt="${esc(p.title)} thumbnail" loading="lazy">
            <span class="thumb-preview" aria-hidden="true"></span>
          </span>
          <div class="content">
            <p class="meta">${esc(formatDate(p.publishedAt))}</p>
            <h3><a href="/post/${esc(p.slug)}">${esc(p.title)}</a></h3>
            <p>${esc(p.excerpt || "Latest robotics intelligence from robot.tv.")}</p>
            <div class="row">
	              <a class="btn btn-primary" href="/post/${esc(p.slug)}">Read Robot News</a>
            </div>
          </div>
        </article>
      `).join("");

      if (totalPages > 1) {
        const section = grid.closest(".section");
        const pager = document.createElement("div");
        pager.className = "pagination";
        const mkUrl = (n) => (n <= 1 ? "/" : `/?page=${n}`);
        pager.innerHTML = `
          <a class="btn btn-ghost" href="${mkUrl(page - 1)}" aria-disabled="${page <= 1 ? "true" : "false"}">Previous</a>
          <span class="pagination-status">Page ${page} of ${totalPages}</span>
          <a class="btn btn-ghost" href="${mkUrl(page + 1)}" aria-disabled="${page >= totalPages ? "true" : "false"}">Next</a>
        `;
        section.appendChild(pager);
      }

      const canHoverPreview = window.matchMedia("(hover: hover) and (pointer: fine)").matches;
      if (!canHoverPreview) return;

      const toEmbed = (u) => {
        const id = videoId(u);
        return id ? `https://www.youtube.com/embed/${id}?autoplay=1&mute=1&playsinline=1&rel=0&modestbranding=1&vq=small` : "";
      };

      const startPreview = (card) => {
        const slot = card.querySelector(".thumb-preview");
        const embed = toEmbed(card.dataset.video);
        if (!slot || !embed || slot.dataset.active === "1") return;
        slot.innerHTML = `<iframe src="${esc(embed)}" title="Article preview" loading="lazy" allow="autoplay; encrypted-media; picture-in-picture" referrerpolicy="strict-origin-when-cross-origin"></iframe>`;
        slot.dataset.active = "1";
        card.classList.add("previewing");
      };

      const stopPreview = (card) => {
        const slot = card.querySelector(".thumb-preview");
        if (!slot) return;
        slot.innerHTML = "";
        slot.dataset.active = "0";
        card.classList.remove("previewing");
      };

      grid.querySelectorAll(".card").forEach((card) => {
        card.addEventListener("mouseenter", () => startPreview(card));
        card.addEventListener("mouseleave", () => stopPreview(card));
        card.addEventListener("blur", () => stopPreview(card));
      });
    };

    const renderArticle = (post) => {
      if (!post) {
        document.title = "Article Not Found | robot.tv News";
        setRobots("noindex,follow");
        if (canonical) canonical.setAttribute("href", "https://news.robot.tv/");
        app.innerHTML = `
          <section class="panel hero">
            <p class="kicker">NOT FOUND</p>
            <h1>Article Not Found</h1>
            <p class="copy">This article may have been removed or its slug changed.</p>
            <div class="actions"><a class="btn btn-primary" href="/">Back to News</a></div>
          </section>
        `;
        return;
      }

      const tags = Array.isArray(post.categories) ? post.categories : [];
      const paragraphs = (post.body || [])
        .filter((b) => b._type === "block")
        .map(blockToText)
        .filter(shouldRenderParagraph);
      const ytId = videoId(post.youtubeUrl);
      const embed = ytId ? `https://www.youtube.com/embed/${ytId}?rel=0&modestbranding=1&playsinline=1` : "";
      document.title = `${post.title} | robot.tv News`;
      setRobots("index,follow");
      setArticleJsonLd(post);

      app.innerHTML = `
        <section class="section-head" style="margin-top:1rem;">
          <h2><a href="/">Newsroom</a></h2>
        </section>

        <section class="article">
          <article class="panel article-main">
            <p class="kicker">ARTICLE</p>
            <h1>${esc(post.title)}</h1>
            <p class="meta" style="margin-top:.55rem;">${esc(formatDate(post.publishedAt))}</p>
            <p class="copy" style="max-width:none;">${esc(post.excerpt || "")}</p>
            ${ytId ? `<div class="video-wrap"><iframe src="${esc(embed)}" title="${esc(post.title)} video" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe></div>` : ""}
            <div class="article-body">
              ${paragraphs.length ? paragraphs.map((p) => `<p>${esc(p)}</p>`).join("") : '<p>Content will be added soon.</p>'}
            </div>
            <div class="actions">
              <a class="btn btn-primary" href="/">Back to News</a>
            </div>
          </article>
          <aside class="panel article-side">
            <h2 style="font-size:1.1rem;">Article Snapshot</h2>
            <p class="copy" style="margin-top:.55rem;">This article is part of robot.tv's video-first robotics coverage.</p>
            <ul class="tag-list">${tags.length ? tags.map((t) => `<li>${esc(t)}</li>`).join("") : "<li>General</li>"}</ul>
          </aside>
        </section>
      `;

    };

    if (path.startsWith("/post/")) {
      const slug = path.replace("/post/", "").trim();
      const query = `*[_type=="post" && slug.current==$slug][0]{title,excerpt,publishedAt,youtubeUrl,body,"slug":slug.current,"author":author->name,"categories":categories[]->title}`;
      fetchJsonWithFallback(sanityUrls(query).map((u) => `${u}&$slug=${sanityParam(slug)}`))
        .then((d) => renderArticle(d.result || null))
        .catch(() => renderArticle(null));
    } else {
      const cached = getCachedPosts();
      if (cached.length) {
        renderList(cached, { warning: "Loading latest updates..." });
      } else {
        renderList([], { emptyMessage: "Loading latest stories..." });
      }

      const query = `*[_type=="post"] | order(publishedAt desc)[0...${FETCH_DEPTH}]{title,excerpt,publishedAt,youtubeUrl,"slug":slug.current,"author":author->name}`;
      fetchJsonWithFallback(sanityUrls(query))
        .then((d) => {
          const posts = Array.isArray(d.result) ? d.result : [];
          if (posts.length) cachePosts(posts);
          renderList(posts);
        })
        .catch(() => {
          const cached = getCachedPosts();
          if (cached.length) {
            renderList(cached, { warning: "Live feed is temporarily unavailable. Showing recently cached stories." });
          } else {
            renderList([], { emptyMessage: "Live feed is temporarily unavailable. Please refresh shortly." });
          }
        });
    }
  </script>
</body>
</html>
