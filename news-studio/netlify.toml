[build]
  command = "npm run build:netlify"
  publish = "dist"

[[redirects]]
  from = "/studio"
  to = "/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/studio/*"
  to = "/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/robots.txt"
  to = "/static/robots.txt"
  status = 200
  force = true

[[redirects]]
  from = "/sitemap.xml"
  to = "/static/sitemap.xml"
  status = 200
  force = true

# Hard-drop obsolete WordPress system endpoints first.
[[redirects]]
  from = "/wp-admin/*"
  to = "/static/404.html"
  status = 410

[[redirects]]
  from = "/wp-content/*"
  to = "/static/404.html"
  status = 410

[[redirects]]
  from = "/wp-includes/*"
  to = "/static/404.html"
  status = 410

[[redirects]]
  from = "/wp-json/*"
  to = "/static/404.html"
  status = 410

[[redirects]]
  from = "/xmlrpc.php"
  to = "/static/404.html"
  status = 410

# Legacy theme/template URLs from old WordPress news stack.
[[redirects]]
  from = "/index.php"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/tdb_templates/*"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/tds-switching-plans-wizard"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/tds-switching-plans-wizard/"
  to = "/"
  status = 301
  force = true

# Legacy WordPress date-style permalinks to current article route.
[[redirects]]
  from = "/:year/:month/:day/:slug"
  to = "/post/:slug"
  status = 301
  force = true

[[redirects]]
  from = "/:year/:month/:slug"
  to = "/post/:slug"
  status = 301
  force = true

# Legacy taxonomy/archive URLs should consolidate to the news homepage.
[[redirects]]
  from = "/category/*"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/tag/*"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/author/*"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/page/*"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/post"
  to = "/"
  status = 301
  force = true

# Canonicalize legacy ".html" article URLs to canonical slug URLs.
[[redirects]]
  from = "/post/chinese-robotics-firms-showcase-advanced-quadruped-robots-for-practical-applications.html"
  to = "/post/chinese-robotics-firms-showcase-advanced-quadruped-robots-for-practical-applications"
  status = 301
  force = true

[[redirects]]
  from = "/post/*.html"
  to = "/post/:splat"
  status = 301
  force = true

# Canonical article route should serve the generated static article HTML.
[[redirects]]
  from = "/post/:slug"
  to = "/static/post/:slug/index.html"
  status = 200

[[redirects]]
  from = "/post/:slug/"
  to = "/static/post/:slug/index.html"
  status = 200

# SPA routes.
[[redirects]]
  from = "/"
  to = "/static/index.html"
  status = 200
  force = true

# Unknown article paths should return 404 (real static article files are served first).
[[redirects]]
  from = "/post/*"
  to = "/static/404.html"
  status = 404

[[redirects]]
  from = "/*"
  to = "/static/404.html"
  status = 404
