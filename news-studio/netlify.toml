[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/studio"
  to = "/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/studio/*"
  to = "/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/"
  to = "/static/index.html"
  status = 200
  force = true
