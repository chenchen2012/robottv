<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Watch robot.tv live programming and streams.">
    <title>Live Now | robot.tv</title>
    <link rel="icon" href="images/favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=20260219-nav-v6">
    <style>
        .live-page {
            margin-top: 1rem;
            padding: 1rem;
        }

        .live-title {
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.6rem, 4.6vw, 2.6rem);
        }

        .live-sub {
            color: var(--muted);
            max-width: 760px;
            line-height: 1.6;
            margin-top: 0.65rem;
        }

        .live-embed {
            margin-top: 1rem;
            border: 1px solid var(--line);
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }

        .live-embed iframe {
            width: 100%;
            aspect-ratio: 16/9;
            border: 0;
            display: block;
        }
        #live-player {
            width: 100%;
            aspect-ratio: 16/9;
        }

        .live-meta {
            margin-top: 0.8rem;
            color: var(--muted);
            font-size: 0.95rem;
        }
    </style>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WC8XB1DN1E"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag("js", new Date());
      gtag("config", "G-WC8XB1DN1E");
    </script>
</head>
<body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="bg-glow bg-glow-red" aria-hidden="true"></div>
    <div class="bg-glow bg-glow-blue" aria-hidden="true"></div>

    <div class="container">
        <header class="site-header">
            <a class="brand" href="index.html" aria-label="robot.tv home">
                <img src="images/robot_logo.png" alt="robot.tv">
            </a>
            <nav class="site-nav" aria-label="Primary navigation">
                <a href="index.html">Home</a>
                <a href="home.html">Robot Index</a>
                <a href="companies.html">Companies</a>
                <a href="live.html">Live Now</a>
                <a href="https://news.robot.tv">News</a>
                <a href="about.html">About</a>
            </nav>
            <a class="nav-cta" href="contact.html">Submit Video</a>
        </header>

        <main class="panel live-page">
            <p class="kicker">LIVE BROADCAST</p>
            <h1 class="live-title">robot.tv Live Now</h1>
            <p class="live-sub">
                Real-time robotics coverage with BattleBots as the default live source.
            </p>

            <div class="live-embed">
                <div id="live-player"></div>
            </div>

            <p class="live-meta" id="live-meta">Loading robot livestream...</p>
            <div class="hero-actions" id="live-fallback-wrap" style="margin-top:0.65rem; display:none;">
                <a id="live-open-direct" class="btn btn-primary" href="#" target="_blank" rel="noopener">Open Feed on YouTube</a>
            </div>
            <div class="hero-actions" style="margin-top:0.85rem;">
                <a class="btn btn-primary" href="https://www.youtube.com/watch?v=C_eFt1Rdy6U" target="_blank" rel="noopener">Open on YouTube</a>
            </div>
        </main>
    </div>
    <script data-cfasync="false">
      const streamCandidates = [
        {
          id: "C_eFt1Rdy6U",
          label: "BattleBots livestream",
          url: "https://www.youtube.com/watch?v=C_eFt1Rdy6U"
        }
      ];

      const meta = document.getElementById("live-meta");
      const fallbackWrap = document.getElementById("live-fallback-wrap");
      const fallbackLink = document.getElementById("live-open-direct");
      let currentIndex = 0;
      let player = null;
      let startupTimer = null;
      let attemptsThisCycle = 0;

      const setMeta = (item, note = "") => {
        if (!item) return;
        meta.innerHTML = `Source: <a href="${item.url}" target="_blank" rel="noopener">${item.label}</a>. ${note || "Auto-rotating live desk is enabled."}`;
      };

      const activate = (index) => {
        currentIndex = (index + streamCandidates.length) % streamCandidates.length;
        const item = streamCandidates[currentIndex];
        setMeta(item);
        fallbackWrap.style.display = "none";
        fallbackLink.href = item.url;
        if (!player || typeof player.loadVideoById !== "function") return;
        player.loadVideoById(item.id);
        clearTimeout(startupTimer);
        startupTimer = setTimeout(() => {
          try {
            const state = player.getPlayerState();
            if (state === -1 || state === 5) failover();
          } catch (_) {}
        }, 9000);
      };

      const failover = () => {
        attemptsThisCycle += 1;
        if (attemptsThisCycle >= streamCandidates.length) {
          const current = streamCandidates[currentIndex];
          setMeta(current, "All feeds look unavailable right now. Try again in a few minutes.");
          fallbackWrap.style.display = "flex";
          fallbackLink.href = current.url;
          return;
        }
        activate(currentIndex + 1);
      };

      function onYouTubeIframeAPIReady() {
        player = new YT.Player("live-player", {
          videoId: streamCandidates[0].id,
          playerVars: {
            autoplay: 1,
            mute: 1,
            rel: 0,
            playsinline: 1
          },
          events: {
            onReady: () => {
              attemptsThisCycle = 0;
              activate(0);
            },
            onStateChange: (event) => {
              if (event.data === YT.PlayerState.ENDED) failover();
              if (event.data === YT.PlayerState.PLAYING) attemptsThisCycle = 0;
            },
            onError: () => failover()
          }
        });
      }

      window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;
    </script>
    <script data-cfasync="false" src="https://www.youtube.com/iframe_api"></script>
    <script data-cfasync="false" src="scripts/nav-active.js?v=20260219-navfix1"></script>
</body>
</html>
