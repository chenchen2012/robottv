<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Watch robot.tv live programming and streams.">
    <title>Live Now | robot.tv</title>
    <link rel="icon" href="images/favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=20260219-nav-v6">
    <style>
        .live-page {
            margin-top: 1rem;
            padding: 1rem;
        }

        .live-title {
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.6rem, 4.6vw, 2.6rem);
        }

        .live-sub {
            color: var(--muted);
            max-width: 760px;
            line-height: 1.6;
            margin-top: 0.65rem;
        }

        .live-embed {
            margin-top: 1rem;
            border: 1px solid var(--line);
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }

        .live-embed iframe {
            width: 100%;
            aspect-ratio: 16/9;
            border: 0;
            display: block;
        }
        #live-player {
            width: 100%;
            aspect-ratio: 16/9;
        }

        .live-meta {
            margin-top: 0.8rem;
            color: var(--muted);
            font-size: 0.95rem;
        }
    </style>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WC8XB1DN1E"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag("js", new Date());
      gtag("config", "G-WC8XB1DN1E");
    </script>
</head>
<body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="bg-glow bg-glow-red" aria-hidden="true"></div>
    <div class="bg-glow bg-glow-blue" aria-hidden="true"></div>

    <div class="container">
        <header class="site-header">
            <a class="brand" href="index.html" aria-label="robot.tv home">
                <img src="images/robot_logo.png" alt="robot.tv">
            </a>
            <nav class="site-nav" aria-label="Primary navigation">
                <a href="index.html">Home</a>
                <a href="home.html">Robot Index</a>
                <a href="companies.html">Companies</a>
                <a href="live.html">Live Now</a>
                <a href="https://news.robot.tv">News</a>
                <a href="about.html">About</a>
            </nav>
            <a class="nav-cta" href="contact.html">Submit Video</a>
        </header>

        <main class="panel live-page">
            <p class="kicker">LIVE BROADCAST</p>
            <h1 class="live-title">robot.tv Live Now</h1>
            <p class="live-sub">
                Real-time robotics coverage across multiple feeds: robot competitions,
                space robotics operations, and frontier engineering streams. The live desk auto-rotates sources.
            </p>

            <div class="live-embed">
                <iframe
                    id="live-frame"
                    src=""
                    title="robot.tv live feed"
                    allow="autoplay; fullscreen; picture-in-picture; encrypted-media"
                    loading="lazy"
                    referrerpolicy="strict-origin-when-cross-origin"
                    allowfullscreen>
                </iframe>
            </div>

            <p class="live-meta" id="live-meta">Loading robot livestream...</p>
            <div class="hero-actions" style="margin-top:0.85rem;">
                <button id="live-prev" type="button" class="btn btn-ghost">Previous Feed</button>
                <button id="live-next" type="button" class="btn btn-primary">Next Feed</button>
            </div>
        </main>
    </div>
    <script data-cfasync="false">
      const streamCandidates = [
        {
          label: "NASA live operations stream",
          url: "https://www.youtube.com/watch?v=21X5lGlDOfg",
          embed: "https://www.youtube-nocookie.com/embed/21X5lGlDOfg?autoplay=1&mute=1&playsinline=1&rel=0&modestbranding=1"
        },
        {
          label: "BattleBots livestream",
          url: "https://www.youtube.com/watch?v=C_eFt1Rdy6U",
          embed: "https://www.youtube-nocookie.com/embed/C_eFt1Rdy6U?autoplay=1&mute=1&playsinline=1&rel=0&modestbranding=1"
        },
        {
          label: "ISS live Earth and station feed",
          url: "https://www.youtube.com/watch?v=DDU-rZs-Ic4",
          embed: "https://www.youtube-nocookie.com/embed/DDU-rZs-Ic4?autoplay=1&mute=1&playsinline=1&rel=0&modestbranding=1"
        }
      ];

      const frame = document.getElementById("live-frame");
      const meta = document.getElementById("live-meta");
      const prevBtn = document.getElementById("live-prev");
      const nextBtn = document.getElementById("live-next");
      let currentIndex = 0;
      let rotationTimer = null;

      const render = (index) => {
        currentIndex = (index + streamCandidates.length) % streamCandidates.length;
        const item = streamCandidates[currentIndex];
        frame.src = item.embed;
        meta.innerHTML = `Source: <a href="${item.url}" target="_blank" rel="noopener">${item.label}</a>. Auto-rotating live desk is enabled.`;
      };

      const rotate = (step) => {
        render(currentIndex + step);
        clearInterval(rotationTimer);
        rotationTimer = setInterval(() => render(currentIndex + 1), 90000);
      };

      prevBtn.addEventListener("click", () => rotate(-1));
      nextBtn.addEventListener("click", () => rotate(1));
      render(0);
      rotationTimer = setInterval(() => render(currentIndex + 1), 90000);
    </script>
    <script data-cfasync="false" src="scripts/nav-active.js?v=20260219-navfix1"></script>
</body>
</html>
