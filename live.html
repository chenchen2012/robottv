<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Watch robot.tv live programming and streams.">
    <title>Live Now | robot.tv</title>
    <link rel="icon" href="images/favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=20260219-nav-v6">
    <style>
        .live-page {
            margin-top: 1rem;
            padding: 1rem;
        }

        .live-title {
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.6rem, 4.6vw, 2.6rem);
        }

        .live-sub {
            color: var(--muted);
            max-width: 760px;
            line-height: 1.6;
            margin-top: 0.65rem;
        }

        .live-embed {
            margin-top: 1rem;
            border: 1px solid var(--line);
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }

        .live-embed iframe {
            width: 100%;
            aspect-ratio: 16/9;
            border: 0;
            display: block;
        }
        #live-player {
            width: 100%;
            aspect-ratio: 16/9;
        }

        .live-meta {
            margin-top: 0.8rem;
            color: var(--muted);
            font-size: 0.95rem;
        }
    </style>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WC8XB1DN1E"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag("js", new Date());
      gtag("config", "G-WC8XB1DN1E");
    </script>
</head>
<body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="bg-glow bg-glow-red" aria-hidden="true"></div>
    <div class="bg-glow bg-glow-blue" aria-hidden="true"></div>

    <div class="container">
        <header class="site-header">
            <a class="brand" href="index.html" aria-label="robot.tv home">
                <img src="images/robot_logo.png" alt="robot.tv">
            </a>
            <nav class="site-nav" aria-label="Primary navigation">
                <a href="index.html">Home</a>
                <a href="home.html">Robot Index</a>
                <a href="companies.html">Companies</a>
                <a href="live.html">Live Now</a>
                <a href="https://news.robot.tv">News</a>
                <a href="about.html">About</a>
            </nav>
            <a class="nav-cta" href="contact.html">Submit Video</a>
        </header>

        <main class="panel live-page">
            <p class="kicker">LIVE BROADCAST</p>
            <h1 class="live-title">robot.tv Live Now</h1>
            <p class="live-sub">
                Real-time robotics coverage, launches, demos, and industry updates.
                Live robot combat coverage from BattleBots on YouTube.
            </p>

            <div class="live-embed">
                <div id="live-player"></div>
            </div>

            <p class="live-meta" id="live-meta">Loading robot livestream...</p>
        </main>
    </div>
    <script>
      const streamCandidates = [
        { id: "G6ERanEbzEE", label: "BattleBots livestream", url: "https://www.youtube.com/watch?v=G6ERanEbzEE" },
        { id: "xk-6syjmGa8", label: "Robotic sci-fi live feed", url: "https://www.youtube.com/watch?v=xk-6syjmGa8" },
        { id: "Hag52ouCzJs", label: "Robot animation livestream", url: "https://www.youtube.com/watch?v=Hag52ouCzJs" }
      ];

      const meta = document.getElementById("live-meta");
      let player;
      let currentIndex = 0;
      let startupTimer = null;

      const setMeta = (text, link) => {
        meta.innerHTML = link
          ? `Source: <a href="${link}" target="_blank" rel="noopener">${text}</a>. Auto-fallback is enabled.`
          : text;
      };

      const activateCandidate = (index) => {
        currentIndex = (index + streamCandidates.length) % streamCandidates.length;
        const item = streamCandidates[currentIndex];
        setMeta(item.label, item.url);
        if (player && typeof player.loadVideoById === "function") {
          player.loadVideoById(item.id);
        }
      };

      const nextCandidate = () => activateCandidate(currentIndex + 1);

      function onYouTubeIframeAPIReady() {
        const first = streamCandidates[0];
        setMeta(first.label, first.url);
        player = new YT.Player("live-player", {
          videoId: first.id,
          playerVars: {
            autoplay: 1,
            mute: 1,
            rel: 0,
            playsinline: 1
          },
          events: {
            onReady: () => {
              player.playVideo();
              clearTimeout(startupTimer);
              startupTimer = setTimeout(() => {
                const state = player.getPlayerState();
                if (state === -1) nextCandidate();
              }, 9000);
            },
            onStateChange: (event) => {
              if (event.data === YT.PlayerState.ENDED) nextCandidate();
            },
            onError: () => nextCandidate()
          }
        });
      }

      window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;
    </script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="scripts/nav-active.js?v=20260219-navfix1"></script>
</body>
</html>
