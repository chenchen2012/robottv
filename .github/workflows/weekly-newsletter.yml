name: Weekly Newsletter

on:
  schedule:
    - cron: "0 16 * * 1"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate weekly newsletter
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          NEWSLETTER_FEED_URL: https://news.robot.tv/feed.xml
          NEWSLETTER_MAX_ITEMS: 8
          NEWSLETTER_OUTPUT_DIR: newsletters
          NEWSLETTER_SITE_URL: https://robot.tv
          NEWSLETTER_TIMEZONE: America/Los_Angeles
        run: node scripts/generate-weekly-newsletter.mjs

      - name: Commit and push updates
        run: |
          if git diff --quiet; then
            echo "No newsletter changes to commit."
            exit 0
          fi
          git config user.name "robot-tv-bot"
          git config user.email "robot-tv-bot@users.noreply.github.com"
          git add newsletters newsletter-feed.xml
          git commit -m "chore(newsletter): generate weekly issue"
          git push
