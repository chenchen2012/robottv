name: Weekly Newsletter

on:
  schedule:
    - cron: "0 16 * * 1"
  workflow_dispatch:
    inputs:
      send_enabled:
        description: "Set to 1 to run the send step for this manual run"
        required: false
        default: "0"
      test_recipients:
        description: "Comma-separated email list for Brevo sendTest instead of live list send"
        required: false
        default: ""

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BREVO_SEND_ENABLED: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.send_enabled || vars.BREVO_SEND_ENABLED || '0' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate weekly newsletter
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          NEWSLETTER_FEED_URL: https://news.robot.tv/feed.xml
          NEWSLETTER_FEED_PATH: news-studio/static/feed.xml
          NEWSLETTER_MAX_ITEMS: 8
          NEWSLETTER_OUTPUT_DIR: newsletters
          NEWSLETTER_SITE_URL: https://robot.tv
          NEWSLETTER_TIMEZONE: America/Los_Angeles
        run: node scripts/generate-weekly-newsletter.mjs

      - name: Upload newsletter review artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weekly-newsletter-preview
          path: |
            newsletters/*.html
            newsletters/*.txt
            ops-private/reports/newsletter/latest-issue.json
            ops-private/reports/newsletter/latest-issue.md
          if-no-files-found: warn

      - name: Send weekly newsletter (Brevo)
        if: ${{ env.BREVO_SEND_ENABLED == '1' }}
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_LIST_ID: 3
          BREVO_SENDER_EMAIL: newsletter@robot.tv
          BREVO_SENDER_NAME: Robot Weekly
          BREVO_TEST_EMAILS: ${{ github.event.inputs.test_recipients }}
          NEWSLETTER_OUTPUT_DIR: newsletters
          NEWSLETTER_SITE_URL: https://robot.tv
        run: node scripts/send-weekly-newsletter-brevo.mjs

      - name: Commit and push updates
        id: commit_push
        run: |
          if git diff --quiet; then
            echo "No newsletter changes to commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "robot-tv-bot"
          git config user.email "robot-tv-bot@users.noreply.github.com"
          git add newsletters newsletter-feed.xml
          git commit -m "chore(newsletter): generate weekly issue"
          git push
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Wait for newsletter archive URL
        if: ${{ github.event_name == 'schedule' && steps.commit_push.outputs.committed == 'true' }}
        id: archive
        run: |
          ISSUE_URL=$(node -e "const fs=require('fs'); const report=JSON.parse(fs.readFileSync('ops-private/reports/newsletter/latest-issue.json','utf8')); console.log(report.issueUrl || '');")
          ISSUE_SLUG=$(node -e "const fs=require('fs'); const report=JSON.parse(fs.readFileSync('ops-private/reports/newsletter/latest-issue.json','utf8')); console.log(report.issueSlug || '');")
          ISSUE_DATE=$(node -e "const fs=require('fs'); const report=JSON.parse(fs.readFileSync('ops-private/reports/newsletter/latest-issue.json','utf8')); console.log(report.issueDate || '');")
          SUBJECT=$(node -e "const fs=require('fs'); const report=JSON.parse(fs.readFileSync('ops-private/reports/newsletter/latest-issue.json','utf8')); console.log(report.subject || '');")
          echo "issue_url=$ISSUE_URL" >> "$GITHUB_OUTPUT"
          echo "issue_slug=$ISSUE_SLUG" >> "$GITHUB_OUTPUT"
          echo "issue_date=$ISSUE_DATE" >> "$GITHUB_OUTPUT"
          echo "subject=$SUBJECT" >> "$GITHUB_OUTPUT"
          LIVE_STATUS="pending"
          for _ in {1..40}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$ISSUE_URL")
            if [ "$STATUS" = "200" ]; then
              LIVE_STATUS="live"
              break
            fi
            sleep 15
          done
          echo "live_status=$LIVE_STATUS" >> "$GITHUB_OUTPUT"

      - name: Send weekly link via GitHub notification issue
        if: ${{ github.event_name == 'schedule' && steps.commit_push.outputs.committed == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_URL: ${{ steps.archive.outputs.issue_url }}
          ISSUE_SLUG: ${{ steps.archive.outputs.issue_slug }}
          ISSUE_DATE: ${{ steps.archive.outputs.issue_date }}
          SUBJECT: ${{ steps.archive.outputs.subject }}
          LIVE_STATUS: ${{ steps.archive.outputs.live_status }}
        run: |
          DELIVERY_TITLE="Robot Weekly Delivery Log"
          ISSUE_NUMBER=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search "\"$DELIVERY_TITLE\" in:title" --json number,title --jq '.[0].number // empty')
          if [ -z "$ISSUE_NUMBER" ]; then
            ISSUE_NUMBER=$(gh api "repos/$GITHUB_REPOSITORY/issues" \
              --method POST \
              --field title="$DELIVERY_TITLE" \
              --field body="This issue is used by automation to deliver the weekly Robot Weekly archive link.\n\nNew weeks will be posted here as comments." \
              --field assignees[]="chenchen2012" \
              --jq '.number')
          fi

          if gh api "repos/$GITHUB_REPOSITORY/issues/$ISSUE_NUMBER/comments" --paginate --jq '.[].body' | rg -Fq "$ISSUE_SLUG"; then
            echo "Newsletter link for $ISSUE_SLUG already posted."
            exit 0
          fi

          if [ "$LIVE_STATUS" = "live" ]; then
            LIVE_LINE="Live check: passed"
          else
            LIVE_LINE="Live check: still propagating when this notification was sent"
          fi

          gh issue comment "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body "@chenchen2012 Robot Weekly is ready for $ISSUE_DATE.\n\n- Subject: $SUBJECT\n- Link: $ISSUE_URL\n- $LIVE_LINE"
