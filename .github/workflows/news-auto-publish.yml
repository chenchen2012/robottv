name: Auto Publish Robot News

on:
  workflow_dispatch:
  schedule:
    - cron: "15 */6 * * *"

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: news-studio
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: news-studio/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Publish latest trusted stories
        env:
          SANITY_PROJECT_ID: lumv116w
          SANITY_DATASET: production
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
          SANITY_AUTHOR_ID: ${{ secrets.SANITY_AUTHOR_ID }}
          NETLIFY_BUILD_HOOK_URL: ${{ secrets.NETLIFY_BUILD_HOOK_URL }}
          PUBLISH_COUNT: "2"
        run: node scripts/publish-latest-news.mjs

      - name: Verify feed freshness and duplicate guard
        env:
          SANITY_PROJECT_ID: lumv116w
          SANITY_DATASET: production
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
          MAX_FEED_AGE_HOURS: "24"
        run: node scripts/check-feed-health.mjs

      - name: Generate social drafts (X / LinkedIn / Reddit)
        env:
          SANITY_PROJECT_ID: lumv116w
          SANITY_DATASET: production
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
          SOCIAL_DRAFT_COUNT: "2"
        run: node scripts/generate-social-drafts.mjs

      - name: Upload social draft artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: social-drafts
          path: |
            news-studio/social-drafts/latest-social-drafts.json
            news-studio/social-drafts/latest-social-drafts.md
          if-no-files-found: warn
