name: Auto Publish Robot News

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

concurrency:
  group: news-auto-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Publish latest robotics posts to Sanity
        run: node news-studio/scripts/publish-latest-news.mjs
        env:
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
          SANITY_AUTHOR_ID: ${{ secrets.SANITY_AUTHOR_ID }}
          PUBLISH_COUNT: 2

      - name: Verify feed freshness and duplicate guard
        run: node news-studio/scripts/check-feed-health.mjs
        env:
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
          MAX_FEED_AGE_HOURS: 24

      - name: Generate social drafts (X / LinkedIn / Reddit)
        run: node news-studio/scripts/generate-social-drafts.mjs
        env:
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
          SOCIAL_DRAFT_COUNT: 2

      - name: Auto publish X directly (optional, preferred)
        run: node news-studio/scripts/publish-x-direct.mjs
        continue-on-error: true
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          SOCIAL_DRAFT_JSON: news-studio/social-drafts/latest-social-drafts.json
          X_REPORT_JSON: news-studio/social-drafts/latest-x-publish-report.json
          SOCIAL_PUBLISH_COUNT: 2

      - name: Upload social draft artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: social-drafts
          path: |
            news-studio/social-drafts/latest-social-drafts.json
            news-studio/social-drafts/latest-social-drafts.md
            news-studio/social-drafts/latest-x-publish-report.json
          if-no-files-found: warn
