name: Auto Publish Robot News

on:
  workflow_dispatch:
  schedule:
    - cron: "15 */6 * * *"

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: news-studio
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Cloudflare Pages configuration
        id: cf
        env:
          CF_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CF_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_PROJECT: ${{ secrets.CLOUDFLARE_NEWS_PAGES_PROJECT_NAME }}
        run: |
          if [ -n "$CF_API_KEY" ] && [ -n "$CF_EMAIL" ] && [ -n "$CF_ACCOUNT_ID" ] && [ -n "$CF_PROJECT" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "skip_public_deploy_hook=1" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "skip_public_deploy_hook=0" >> "$GITHUB_OUTPUT"
            echo "Cloudflare Pages secrets missing; scheduled publish will continue using NEWS_PUBLIC_DEPLOY_HOOK_URL if available."
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: news-studio/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Publish latest trusted stories
        env:
          SANITY_PROJECT_ID: lumv116w
          SANITY_DATASET: production
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
          SANITY_AUTHOR_ID: ${{ secrets.SANITY_AUTHOR_ID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          NEWS_PUBLIC_DEPLOY_HOOK_URL: ${{ secrets.NEWS_PUBLIC_DEPLOY_HOOK_URL }}
          SKIP_PUBLIC_DEPLOY_HOOK: ${{ steps.cf.outputs.skip_public_deploy_hook }}
          PUBLISH_COUNT: "2"
        run: node scripts/publish-latest-news.mjs

      - name: Verify feed freshness and duplicate guard
        env:
          SANITY_PROJECT_ID: lumv116w
          SANITY_DATASET: production
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
          MAX_FEED_AGE_HOURS: "24"
        run: node scripts/check-feed-health.mjs

      - name: Generate social drafts (X / LinkedIn / Reddit)
        env:
          SANITY_PROJECT_ID: lumv116w
          SANITY_DATASET: production
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
          SOCIAL_DRAFT_COUNT: "2"
        run: node scripts/generate-social-drafts.mjs

      - name: Upload social draft artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: social-drafts
          path: |
            news-studio/social-drafts/latest-social-drafts.json
            news-studio/social-drafts/latest-social-drafts.md
          if-no-files-found: warn

      - name: Build public news site
        if: steps.cf.outputs.enabled == 'true'
        run: npm run build:public

      - name: Deploy public news site to Cloudflare Pages
        if: steps.cf.outputs.enabled == 'true'
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4 pages deploy dist-public --project-name="${{ secrets.CLOUDFLARE_NEWS_PAGES_PROJECT_NAME }}"
