name: Deploy Public News Site

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-news-public.yml"
      - "news-studio/package.json"
      - "news-studio/package-lock.json"
      - "news-studio/static/**"
      - "scripts/editorial-pinned-posts.mjs"
      - "news-studio/scripts/build-static-news-seo.mjs"
      - "news-studio/scripts/build-public-dist.mjs"
      - "news-studio/scripts/check-public-build.mjs"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Cloudflare Pages configuration
        id: cf
        env:
          CF_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CF_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_PROJECT: ${{ secrets.CLOUDFLARE_NEWS_PAGES_PROJECT_NAME }}
        run: |
          if [ -n "$CF_API_KEY" ] && [ -n "$CF_EMAIL" ] && [ -n "$CF_ACCOUNT_ID" ] && [ -n "$CF_PROJECT" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare Pages secrets missing; skipping deploy."
          fi

      - name: Setup Node
        if: steps.cf.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: news-studio/package-lock.json

      - name: Install dependencies
        if: steps.cf.outputs.enabled == 'true'
        working-directory: news-studio
        run: npm ci

      - name: Build public news site
        if: steps.cf.outputs.enabled == 'true'
        working-directory: news-studio
        run: npm run build:public

      - name: Deploy public news site to Cloudflare Pages
        if: steps.cf.outputs.enabled == 'true'
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4 pages deploy news-studio/dist-public --project-name="${{ secrets.CLOUDFLARE_NEWS_PAGES_PROJECT_NAME }}"
